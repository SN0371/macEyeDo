name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Create .app bundle
        run: |
          APP=macEyeDo.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp .build/apple/Products/Release/maceyedo "$APP/Contents/MacOS/macEyeDo"

          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>      <string>macEyeDo</string>
            <key>CFBundleIdentifier</key>      <string>com.sn0371.maceyedo</string>
            <key>CFBundleName</key>            <string>macEyeDo</string>
            <key>CFBundleDisplayName</key>     <string>macEyeDo</string>
            <key>CFBundleVersion</key>         <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key> <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>LSUIElement</key>             <true/>
            <key>NSHighResolutionCapable</key> <true/>
            <key>LSMinimumSystemVersion</key>  <string>13.0</string>
          </dict>
          </plist>
          PLIST

      - name: Zip .app
        run: zip -r macEyeDo-${{ github.ref_name }}.zip macEyeDo.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macEyeDo-${{ github.ref_name }}.zip
          generate_release_notes: true
